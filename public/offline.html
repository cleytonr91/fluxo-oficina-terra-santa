<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1d2524" />
    <title>Fluxo Oficina offline</title>
    <style>
      :root {
        color: #1d2524;
        background: #f6f8f6;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(420px, 100%);
        border: 1px solid #d8ded8;
        border-radius: 8px;
        background: #fff;
        padding: 24px;
        box-shadow: 0 18px 40px rgba(29, 37, 36, 0.12);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 24px;
      }

      p {
        margin: 0;
        color: #5f6b67;
        line-height: 1.45;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Sem conexão</h1>
      <p>O Fluxo Oficina precisa de internet para atualizar veículos, movimentações e dados em tempo real. Verifique a conexão e tente novamente.</p>
    </main>
  </body>
</html>
